name: Sync registry manifests
on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  repository_dispatch:
    types: [plugin-release, workflow-release]
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Plugin directory name (optional; if set, syncs only that plugin)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: sync-${{ github.event.client_payload.plugin || github.event.inputs.plugin || 'all' }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out workflow
        # I-6 (round-4): guard must trigger only when a plugin name is in
        # flight — NOT for any repository_dispatch. The `workflow-release`
        # event type is also a repository_dispatch but sets no
        # client_payload.plugin, so it must keep its _workflow checkout +
        # Go setup. The negated-OR form below skips only when a non-empty
        # plugin is supplied via either dispatch source.
        if: >-
          (github.event_name != 'repository_dispatch' || github.event.client_payload.plugin == '')
          && (github.event_name != 'workflow_dispatch' || github.event.inputs.plugin == '')
        uses: actions/checkout@v4
        with:
          repository: GoCodeAlone/workflow
          path: _workflow

      - name: Set up Go
        # I-6 (round-4): guard must trigger only when a plugin name is in
        # flight — NOT for any repository_dispatch. The `workflow-release`
        # event type is also a repository_dispatch but sets no
        # client_payload.plugin, so it must keep its _workflow checkout +
        # Go setup. The negated-OR form below skips only when a non-empty
        # plugin is supplied via either dispatch source.
        if: >-
          (github.event_name != 'repository_dispatch' || github.event.client_payload.plugin == '')
          && (github.event_name != 'workflow_dispatch' || github.event.inputs.plugin == '')
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: _workflow/go.sum

      - name: Resolve plugin filter from event
        id: filter
        # Per round-1 C-1: do NOT inline ${{ ... }} into bash. Read from env.
        env:
          PLUGIN_FROM_DISPATCH: ${{ github.event.client_payload.plugin }}
          PLUGIN_FROM_INPUT:    ${{ github.event.inputs.plugin }}
          EVENT_NAME:           ${{ github.event_name }}
          # github.event.action is the repository_dispatch event_type
          # (e.g. "plugin-release" or "workflow-release"). Empty for other
          # event triggers (schedule, workflow_dispatch).
          DISPATCH_ACTION:      ${{ github.event.action }}
        run: |
          set -euo pipefail
          plugin=""
          case "${EVENT_NAME}" in
            repository_dispatch)
              plugin="${PLUGIN_FROM_DISPATCH}"
              # Per Copilot review on #84: plugin-release MUST carry a
              # client_payload.plugin name. A malformed/omitted payload
              # should warn-and-skip, not silently fall back to the
              # expensive all-plugins sweep. workflow-release intentionally
              # carries no plugin field — it triggers the full sync, so we
              # leave its empty value alone.
              if [[ "${DISPATCH_ACTION}" == "plugin-release" && -z "${plugin}" ]]; then
                # No raw value to echo (plugin is empty by definition). Safe.
                echo "::warning::plugin-release dispatch received with empty client_payload.plugin; skipping (use workflow-release for full-sync intent)"
                echo "skip=1" >> "$GITHUB_OUTPUT"
                echo "plugin=" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              ;;
            workflow_dispatch)
              plugin="${PLUGIN_FROM_INPUT}"
              ;;
          esac
          # Defensive validation: only allow [A-Za-z0-9._-]+, no path separators.
          # The concurrency group key uses the same value verbatim (Actions does
          # NOT sanitise the key — it locks against an opaque string), so the
          # bash step here is the real sanitisation boundary for filesystem refs.
          # Round-2 Copilot finding: do NOT echo the raw plugin value back
          # inside a ::warning:: workflow command. Newlines / %-sequences
          # in client_payload.plugin could be interpreted as additional log
          # commands (annotation injection). Log the rejection without
          # quoting the value; the payload itself is in GitHub's webhook
          # event log if forensic detail is needed.
          if [[ -n "${plugin}" ]]; then
            if [[ ! "${plugin}" =~ ^[A-Za-z0-9._-]+$ ]]; then
              echo "::warning::plugin-name regex validation failed; ignoring this dispatch"
              echo "skip=1" >> "$GITHUB_OUTPUT"
              echo "plugin=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [[ ! -d "plugins/${plugin}" ]]; then
              echo "::warning::dispatched plugin has no directory under plugins/; skipping"
              echo "skip=1" >> "$GITHUB_OUTPUT"
              echo "plugin=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "plugin=${plugin}" >> "$GITHUB_OUTPUT"
          echo "skip=0" >> "$GITHUB_OUTPUT"

      - name: Detect and update drifted manifests
        if: steps.filter.outputs.skip != '1'
        id: sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLUGIN:   ${{ steps.filter.outputs.plugin }}
        run: |
          set -euo pipefail
          if [[ -n "${PLUGIN}" ]]; then
            echo "syncing single plugin: ${PLUGIN}"
            scripts/sync-versions.sh --fix --plugin "${PLUGIN}"
            # Skip sync-core-manifests.sh on filter path — that script
            # syncs engine plugins sourced from the _workflow checkout
            # and is irrelevant to an external-plugin dispatch.
            scripts/generate-readme.sh
          else
            echo "syncing all plugins (cron / full run)"
            scripts/sync-versions.sh --fix
            WORKFLOW_REPO="$GITHUB_WORKSPACE/_workflow" scripts/sync-core-manifests.sh --fix
            scripts/generate-readme.sh
          fi
          if git diff --quiet -- plugins README.md; then
            echo "changed=0" >> "$GITHUB_OUTPUT"
          else
            echo "changed=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR if manifests changed
        # I-5 (round-3): the && skip guard is REQUIRED. Without it, a
        # skip=1 filter result causes the sync step to be skipped, which
        # leaves steps.sync.outputs.changed as the empty string. The
        # naked `!= '0'` check is true for empty strings, so the PR step
        # would run with PLUGIN="", fall into the cron-path else branch,
        # and crash on `git commit` with "nothing to commit". Belt-and-
        # suspenders: mirror the sync step's own skip guard here.
        if: steps.sync.outputs.changed != '0' && steps.filter.outputs.skip != '1'
        env:
          GH_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          PLUGIN:          ${{ steps.filter.outputs.plugin }}
          EVENT_NAME:      ${{ github.event_name }}
          DISPATCH_ACTION: ${{ github.event.action }}
        run: |
          set -euo pipefail
          DATE=$(date +%Y-%m-%d)

          if [[ -n "${PLUGIN}" ]]; then
            # Dispatch / single-plugin path. Concurrency group already
            # ensures only one run executes per plugin at a time, so the
            # branch-collision race is structurally eliminated. Branch
            # name still includes the plugin-version for clarity.
            version="$(jq -r '.version' "plugins/${PLUGIN}/manifest.json")"
            version="${version#v}"   # belt-and-suspenders strip in case .version is v-prefixed
            BRANCH="chore/sync-${PLUGIN}-v${version}"
            TITLE="chore: sync ${PLUGIN} to v${version}"
            # Round-3 Copilot: PR body must reflect the actual trigger
            # (repository_dispatch vs manual workflow_dispatch) so
            # reviewers/auditors aren't misled.
            case "${EVENT_NAME}" in
              repository_dispatch)
                TRIGGER_DESC="repository_dispatch (event_type=${DISPATCH_ACTION})"
                ;;
              workflow_dispatch)
                TRIGGER_DESC="manual workflow_dispatch with plugin=${PLUGIN}"
                ;;
              *)
                TRIGGER_DESC="${EVENT_NAME}"
                ;;
            esac
            BODY="Triggered by ${TRIGGER_DESC} for plugin '${PLUGIN}'. Updates \`plugins/${PLUGIN}/manifest.json\` to match the latest GitHub release. Auto-generated by sync-registry-manifests workflow. Refs GoCodeAlone/workflow-registry#79."
          else
            # Cron / full-run path — unchanged from prior behaviour.
            BRANCH="chore/sync-registry-manifests-${DATE}"
            TITLE="chore: sync registry manifests to latest plugin releases (${DATE})"
            BODY="Registry drift check detected plugin release, workflow core plugin, or README index changes. Auto-generated by sync-registry-manifests workflow. Closes GoCodeAlone/workflow-registry#37."
          fi

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

          # Re-run / stale-branch handling.
          #
          # Round-2 Copilot finding: prior approaches (delete branch / force
          # overwrite / checkout main -- ...) all had defects — deleting the
          # branch closes any open PR, and the "checkout main -- plugins/"
          # path discarded the freshly-synced working tree.
          #
          # Pragmatic policy: if the branch already exists, do NOT touch it.
          # The branch name encodes plugin + version, so re-running for the
          # same version means either (a) an open PR is still being reviewed
          # (preserve it untouched), or (b) the PR was already closed/merged
          # (no point recreating). In either case the right action is to
          # log and exit cleanly. Maintainers who want to force a re-sync
          # for the same version must manually delete the branch first.
          #
          # Concurrency group already serialises same-plugin dispatches at
          # the scheduler level, so two concurrent runs cannot reach this
          # step simultaneously.
          if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null 2>&1; then
            existing="$(gh pr list --head "${BRANCH}" --state open --json number --jq '.[0].number // empty')"
            if [[ -n "${existing}" ]]; then
              echo "branch ${BRANCH} already has open PR #${existing}; skipping (further updates should land on that PR)"
            else
              echo "branch ${BRANCH} exists with no open PR; skipping (delete the branch manually if a re-sync for the same version is needed)"
            fi
            exit 0
          fi

          git checkout -b "${BRANCH}"
          git add plugins/ README.md
          git commit -m "${TITLE}"
          git push origin "${BRANCH}"
          gh pr create --base main --head "${BRANCH}" --title "${TITLE}" --body "${BODY}"
