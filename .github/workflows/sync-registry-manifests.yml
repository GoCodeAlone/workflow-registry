name: Sync registry manifests
on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect and update drifted manifests
        id: sync
        run: |
          set -euo pipefail
          CHANGED=0
          for manifest in plugins/*/manifest.json; do
            plugin_dir=$(dirname "$manifest")
            plugin_name=$(basename "$plugin_dir")

            # Extract source field (github.com/GoCodeAlone/...)
            source=$(python3 -c "import json,sys; m=json.load(open('$manifest')); print(m.get('source',''))" 2>/dev/null || echo "")
            if [ -z "$source" ]; then continue; fi

            # Only handle GoCodeAlone plugins
            if ! echo "$source" | grep -q "GoCodeAlone/"; then continue; fi

            repo=$(echo "$source" | sed 's|github.com/||')

            # Get latest release tag from GitHub
            latest_tag=$(gh api "repos/$repo/releases/latest" --jq '.tag_name' 2>/dev/null || echo "")
            if [ -z "$latest_tag" ]; then
              # Fall back to latest tag if no releases
              latest_tag=$(gh api "repos/$repo/tags" --jq '.[0].name' 2>/dev/null || echo "")
            fi
            if [ -z "$latest_tag" ]; then continue; fi

            latest_version="${latest_tag#v}"
            current_version=$(python3 -c "import json; print(json.load(open('$manifest')).get('version',''))")

            if [ "$current_version" != "$latest_version" ]; then
              echo "Drift: $plugin_name $current_version -> $latest_version"
              python3 -c "
          import json
          p = json.load(open('$manifest'))
          p['version'] = '$latest_version'
          json.dump(p, open('$manifest', 'w'), indent=2)
          open('$manifest', 'a').write('\n')
          "
              CHANGED=$((CHANGED + 1))
            fi
          done
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open PR if manifests changed
        if: steps.sync.outputs.changed != '0'
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="chore/sync-registry-manifests-${DATE}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add plugins/
          git commit -m "chore: sync registry manifests to latest plugin tags (${DATE})"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: sync registry manifests to latest plugin tags (${DATE})" \
            --body "Daily drift check detected version mismatches between plugin GitHub tags and registry manifest versions. Auto-generated by sync-registry-manifests workflow. Closes GoCodeAlone/workflow-registry#37."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
